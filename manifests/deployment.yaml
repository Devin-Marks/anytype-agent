apiVersion: apps/v1
kind: Deployment
metadata:
  name: anytype-agent
  namespace: anytype
  labels:
    app.kubernetes.io/name: anytype-agent
    app.kubernetes.io/component: api
  annotations:
    configmap.reloader.stakater.com/reload: "anytype-agent-policy,anytype-agent-config"
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: anytype-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anytype-agent
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: ghcr.io/your-org/anytype-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: anytype-agent-config
            - secretRef:
                name: anytype-agent-secrets
          env:
            - name: OPENSHELL_POLICY_DIR
              value: /etc/openshell/policies
          volumeMounts:
            - name: openshell-policy
              mountPath: /etc/openshell/policies
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: openshell-policy
          configMap:
            name: anytype-agent-policy
            items:
              - key: sandbox-policy.yaml
                path: sandbox-policy.yaml
              - key: inference-policy.yaml
                path: inference-policy.yaml
              - key: provider.yaml
                path: provider.yaml
