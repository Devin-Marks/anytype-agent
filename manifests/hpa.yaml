apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: anytype-agent
  namespace: anytype
  labels:
    app.kubernetes.io/name: anytype-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: anytype-agent
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
