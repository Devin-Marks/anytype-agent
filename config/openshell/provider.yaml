# Credential provider configuration
# Credentials injected at sandbox runtime, never written to disk

version: "1.0"
providers:
  - name: anytype
    type: api_key
    inject_env: true
    # Actual value set via openshell CLI or secrets manager

  - name: llm
    type: api_key
    inject_env: true
    # Prefer LLM_API_KEY for hosted providers. Local providers may not need a key.

  - name: guardrail-llm
    type: api_key
    inject_env: true
    # Optional GUARDRAIL_LLM_API_KEY when guardrails use a separate credential.