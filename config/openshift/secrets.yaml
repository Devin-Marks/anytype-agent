apiVersion: v1
kind: Secret
metadata:
  name: anytype-agent-secrets
  namespace: anytype
  labels:
    app.kubernetes.io/name: anytype-agent
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  ANYTYPE_API_KEY: "REPLACE_WITH_ACTUAL_ANYTYPE_KEY"
  LLM_API_KEY: "REPLACE_WITH_ACTUAL_LLM_KEY"
  # Optional separate guardrail key. Leave empty to reuse LLM_API_KEY.
  GUARDRAIL_LLM_API_KEY: ""
