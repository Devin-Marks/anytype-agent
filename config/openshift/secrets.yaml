apiVersion: v1
kind: Secret
metadata:
  name: anytype-agent-secrets
  namespace: anytype
  labels:
    app.kubernetes.io/name: anytype-agent
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  ANYTYPE_API_KEY: "REPLACE_WITH_ACTUAL_ANYTYPE_KEY"
  OPENAI_API_KEY: "REPLACE_WITH_ACTUAL_OPENAI_KEY"
  # Optional provider keys. Remove unused providers before applying.
  ANTHROPIC_API_KEY: ""
  OPENSHELL_PROVIDER_ANYTYPE: "REPLACE_WITH_ACTUAL_ANYTYPE_KEY"
  OPENSHELL_PROVIDER_OPENAI: "REPLACE_WITH_ACTUAL_OPENAI_KEY"
